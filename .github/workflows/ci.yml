name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios:
    name: iOS Build
    runs-on: macos-14
    defaults:
      run:
        working-directory: Frontend/iOS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Xcode Swift packages
        uses: actions/cache@v4
        with:
          path: Frontend/iOS/.spm
          key: ${{ runner.os }}-xcode-spm-${{ hashFiles('Frontend/iOS/Cookey.xcodeproj/project.pbxproj', 'Frontend/iOS/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-spm-

      - name: Resolve iOS package dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project Cookey.xcodeproj \
            -scheme Cookey \
            -clonedSourcePackagesDirPath .spm

      - name: Build iOS app without code signing
        run: |
          xcodebuild \
            -project Cookey.xcodeproj \
            -scheme Cookey \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath .spm \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

  cli:
    name: CLI Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift 6.0
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            CLI/.build
            CLI/.swiftpm
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm/cache
          key: ${{ runner.os }}-swift-6.0-cli-${{ hashFiles('CLI/Package.swift', 'CLI/Package.resolved', 'Packages/CryptoBox/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.0-cli-

      - name: Resolve CLI dependencies
        run: swift package resolve --package-path CLI

      - name: Build CLI
        run: swift build --package-path CLI -c release

  server-docker:
    name: Server Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server Docker image
        uses: docker/build-push-action@v6
        with:
          context: Server
          file: Server/Dockerfile
          push: false
          tags: cookey-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
